publications:
  - title: AlphaZero Vs Stockfish – A Review of Chess Engines
    publication_type: Research Paper
    publisher: Journal of Emerging Technologies and Innovative Research (JETIR)
    year: 2022                          # URL filename JETIR2204161 → vol 22, issue 04 = Apr 2022
                                        # (you wrote 2023 — flip this if 2023 is correct)
    date: 2022-04-01
    status: Published
    role: author                        # sole author (first-person voice in abstract)
    url: https://www.jetir.org/papers/JETIR2204161.pdf

    domains:
      - Artificial Intelligence
      - Machine Learning
      - Reinforcement Learning
      - Game Theory
      - Search Algorithms

    key_topics:
      - AlphaZero Architecture
      - Stockfish Architecture
      - Reinforcement Learning
      - Monte Carlo Tree Search (MCTS)
      - Traditional Search Algorithms
      - Neural Networks
      - Chess Engine Evolution
      - Artificial Intelligence Research

    skills_demonstrated:
      - Technical Research
      - Comparative Analysis
      - Technical Writing
      - AI Fundamentals
      - Literature Review
      - Communication of Complex Concepts

    significance:
      - Demonstrated early interest in Artificial Intelligence
      - Explored modern reinforcement learning systems
      - Published technical work prior to entering industry

    # Polished portfolio-display blurb (use this on the site card)
    summary: >
      Comparative study of AlphaZero and Stockfish, analyzing two
      fundamentally different approaches to computer chess. The paper
      explores reinforcement learning-based systems versus traditional
      search-based engines and evaluates their architecture, training
      methodologies, strengths, limitations, and impact on modern AI
      research.

    # Verbatim abstract from the published paper (lightly cleaned for case/punct)
    abstract: >
      One of the biggest domains for Artificial Intelligence is the domain
      of games. The algorithms for chess mostly include various search
      techniques, chess-specific adaptation, and specially developed
      algorithms by experts in chess. Recently AlphaZero — a relatively
      recent development — has performed exceptionally. AlphaZero is an
      algorithm based on reinforcement learning: a self-learning,
      observing, and self-rewarding-based algorithm. The program has
      learned everything it knows by playing, evaluating, and rewarding
      itself. The leading program in chess, Stockfish, which uses
      alpha-beta search, was one of the strongest. In a 100-game match,
      AlphaZero defeated Stockfish. In this paper, I compare AlphaZero
      with Stockfish by looking at the algorithms used, games played,
      and the decision process of each program.


