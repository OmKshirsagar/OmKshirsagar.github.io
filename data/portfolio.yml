          - Download Asset
          - Search Assets
          - Retrieve Metadata
          - Update Metadata
          - Delete Assets

    workflow:
      - Client provides connection details
      - Platform selects appropriate adapter
      - Request routed through abstraction layer
      - Provider-specific implementation executed
      - Standardized response returned

    technical_decisions:
      - title: Adapter-Based Architecture
        reasons:
