      - Machine Learning
      - TensorFlow
      - OpenCV
      - MediaPipe
      - GPT Realtime
      - Backend Development
      - Frontend Development
      - System Integration
      - Rapid Prototyping

    differentiators:
      - Combined CV + ML + LLMs
      - Real-time processing pipeline
      - Voice and text outputs
      - Accessibility-focused solution
      - Built within 3 days

    summary: |
      AgentX Hackathon (3 days · team of 5 · Om as Team Lead): multimodal
      AI for sign language interpretation. Live video → MediaPipe landmark
      detection → TensorFlow gesture classification → GPT Realtime sentence
      generation → text + voice output. End-to-end accessibility solution
      shipped in a weekend.

