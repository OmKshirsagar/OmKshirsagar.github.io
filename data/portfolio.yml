    technologies:
      - Python
      - FastAPI
      - PostgreSQL
      - Angular

    # Major deliverables — each is a rich entity capturing problem,
    # architectural reasoning, contributions, outcomes, and skills.
    deliverables:

      - id: configurable-kanban-engine
        title: Configurable Kanban Engine
        type:
          - Backend Architecture
          - Workflow System
        problem: >
          Multiple applications required Kanban-style workflow functionality.
          Each application had different lanes, statuses, fields, and workflow
          requirements. Building separate implementations for every application
          would significantly increase development and maintenance effort.
        challenges:
          - Different applications required different workflows
          - Different applications required different schemas
          - Workflow configuration needed to remain flexible
          - Solution needed to be reusable across projects
        solution: >
          Designed a configurable JSON-driven architecture that allowed
          applications to define their own workflow schemas, lanes, statuses,
          and metadata without requiring backend code changes.
        technical_design:
          key_components:
            - Dynamic Workflow Configuration
            - JSON-Based Schema Definitions
            - Custom Lane Definitions
            - Custom Status Definitions
            - Metadata-Driven Rendering
        architecture_decision:
          decision: >
            Store workflow definitions as configurable structures rather than
            hardcoded business logic.
          reasoning:
            - Increased reusability
            - Reduced duplicate development effort
            - Simplified onboarding of new applications
            - Improved maintainability
        my_contributions:
          - Proposed configurable architecture
          - Designed schema structure
          - Developed backend APIs
          - Collaborated with frontend developers
          - Worked with architects and technical leads
          - Participated in overall workflow design
        technologies:
          - FastAPI
          - PostgreSQL
          - JSON Schema Design
        outcome: >
          Enabled multiple applications to leverage a common workflow
          framework while maintaining flexibility for application-specific
          requirements.
        career_impact: >
          One of the first examples of independently identifying a reusable
          engineering solution and successfully driving its implementation
          within a client project.
        skills_demonstrated:
          - System Design
          - Backend Architecture
          - API Design
          - Database Design
          - Stakeholder Communication
          - Cross-Team Collaboration

      - id: in-memory-pdf-generation
        title: In-Memory PDF Generation Service
        type:
          - Backend Architecture
          - Cost Optimization
          - Document Processing
        business_problem: >
          Business users needed the ability to export application data into
          PDF documents for review, sharing, and reporting purposes.
        existing_assumption: >
          Generated documents would be uploaded to a storage service such
          as S3 before being returned to users.
        challenges:
          - Generated PDFs were transient
          - Source data already existed in the database
          - Generated documents were not intended for long-term storage
          - Additional storage increased operational complexity
          - Upload/download cycle introduced unnecessary latency
        observation: >
          Since the generated PDF was derived from existing database records
          and immediately consumed by the user, persisting the generated file
          provided little business value.
        architecture_decision:
          decision: >
            Generate PDFs entirely in memory and stream them directly to
            users instead of persisting them in external storage.
          alternatives_considered:
            - Store generated files in S3
            - Store generated files on application servers
            - Generate on-demand and stream directly
          selected_approach:
            - In-memory generation
            - Temporary buffer management
            - Direct response streaming
        technical_design:
          workflow:
            - Retrieve data from PostgreSQL
            - Transform data into PDF format
            - Generate PDF in memory buffer
            - Stream response directly to user
            - Release memory after request completion
        technologies:
          - Python
          - FastAPI
          - PostgreSQL
          - Memory Buffers
          - PDF Generation Libraries
        my_contributions:
          - Identified unnecessary storage dependency
          - Proposed alternative architecture
          - Designed implementation approach
          - Implemented backend service
          - Demonstrated solution to leadership teams
        benefits:
          performance:
            - Reduced document retrieval latency
            - Eliminated upload/download round trips
          operational:
            - Simplified architecture
            - Reduced storage management overhead
          cost:
            - Eliminated unnecessary storage costs
            - Reduced infrastructure usage
        recognition: >
          The solution received positive recognition from Deloitte leadership,
          project stakeholders, and external development teams due to its
          simplicity, practicality, and cost-conscious design.
        career_significance: >
          One of the earliest examples of identifying an architectural
          inefficiency, challenging the default implementation approach,
          and successfully delivering a simpler solution with measurable
          operational benefits.
        skills_demonstrated:
          - System Design
          - Cost Optimization
          - Performance Optimization
          - Backend Engineering
          - Architecture Decision Making
          - Technical Communication

    outcomes: []
    lessons: []

