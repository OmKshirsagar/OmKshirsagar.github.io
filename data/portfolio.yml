    career_significance: >
      One of the earliest projects where Om simultaneously operated as a
      technical lead, ML engineer, backend engineer, frontend engineer,
      and AI integrator. Demonstrated the ability to rapidly prototype
      complex multimodal AI systems under severe time constraints.

    skills_demonstrated:
