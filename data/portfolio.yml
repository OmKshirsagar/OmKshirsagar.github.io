hackathons:
  - id: sign-language-ai
    name: AgentX Hackathon
    project_built: Sign Language AI System
    date:                                 # TODO: when did this happen?
    duration: 3 days
    period_type: Weekend Hackathon
    your_role: team-lead
    team_size: 5
    outcome:                              # TODO: winner | finalist | participant
    placement:                            # TODO
    url:
    featured: true                        # ★ featured on home page (cross-cutting: shown alongside featured projects)
    order: 3                              # display order: 3 of 3

    project_type:
      - Computer Vision
      - Machine Learning
      - Accessibility Technology
      - Multimodal AI
      - Real-Time AI System

    objective: >
      Build an AI-powered sign language interpretation system capable of
      translating hand gestures into spoken and written language, improving
      communication accessibility for users relying on sign language.

    problem_statement: >
      Communication barriers exist between sign language users and
      individuals unfamiliar with sign language. Traditional translation
      methods often require human interpreters and are not always
      readily available.

    solution: >
      Developed a real-time multimodal AI system capable of recognizing
      sign language gestures from live video, converting recognized
      gestures into words, generating natural language sentences, and
      producing both text and voice outputs.

    team_name: ARCOY

    repo: agentx-hackathon-team-arcoy

    technologies:
      frontend:
        - React 18
        - TypeScript
        - Vite 6.3.5
        - Tailwind CSS
        - Radix UI primitives
        - Motion library
        - Web Audio API
        - WebRTC getUserMedia
      backend:
        - Python 3.10
        - FastAPI 0.115
        - WebSockets 15.0.1
        - Pydantic 2.10+
        - uv (package manager)
      computer_vision:
        - OpenCV 4.10.0
        - MediaPipe 0.10.18 Hands
      ml:
        - Custom TensorFlow model (H5)
        - Label encoder (pickled)
      ai:
        - Azure OpenAI gpt-realtime
        - OpenAI Agents SDK 0.3.3
      infra:
        - GitHub Codespaces devcontainer
        - Docker + docker-compose

    dataset:
      images_captured: 12000+               # hand-captured by team
      gestures_supported: 31

    ml_model:
      type: Custom TensorFlow H5 classifier
      input_dim: 195                        # 21 MediaPipe landmarks × 2 hands × 3 coords (xyz) + extras
      output_classes: 31

    performance:
      gesture_detection_latency: <50ms
      webcam_capture_cadence: 200ms (5 fps)
      gesture_confirmation: 3–4 consecutive identical predictions

    architecture:
      pipeline:
        - Video Input (webcam @ 5fps)
        - Base64 JPEG over WebSocket
        - MediaPipe landmark extraction (195-dim vector)
        - Custom TensorFlow classifier (31 gestures)
        - Gesture confirmation buffer (3–4 consecutive)
        - Pause-then-flush pipeline (≥3 gestures + 3s pause)
        - Duplicate-word filtering
        - GPT Realtime sentence generation
        - PCM16 audio @ 24kHz 16-bit mono streamed back
        - Text + voice output (dual-view UI)
      workflow: >
        Webcam → OpenCV Capture → base64 JPEG over WebSocket (every 200ms) →
        MediaPipe Hands extracts 195-dim feature vector → custom TensorFlow
        H5 model classifies into 31 gestures → confirmation buffer (3–4
        repeats) → pause-then-flush after 3s silence → duplicate-word filter
        → Azure OpenAI gpt-realtime generates natural sentence → PCM16
        audio streamed back. Dual-view UI shows raw ML predictions
        side-by-side with GPT-enhanced sentence (great demo storytelling).
      transport: Single WebSocket endpoint, bidirectional (`/api/ws/sign-language`)

    technical_components:

      - id: ml-pipeline
        title: ML Pipeline (CV + Gesture Classification)
        objective: >
          Detect sign language gestures from video frames and classify
          them into meaningful words for sentence generation.
        technologies: [OpenCV, MediaPipe, TensorFlow]
        workflow:
          - Capture Video Frames
          - Detect Hand Positions
          - Extract Hand Landmarks
          - Generate Feature Vectors
          - Train Classification Model
          - Predict Sign Language Tokens
        my_contributions:
          - Dataset preparation
          - Model training
          - Feature engineering
          - Classification tuning
          - Prediction validation
        outcome: >
          Successfully generated structured word outputs from live sign
          language gestures.

      - id: llm-sentence-generation
        title: GPT Realtime Sentence Generation
        problem: >
          Individual sign predictions often lacked the grammatical structure
          required for natural communication.
        solution: >
          Integrated GPT Realtime to transform recognized words into coherent
          English sentences suitable for conversation.
        workflow:
          - Word Predictions
          - Context Assembly
          - GPT Realtime Processing
          - Sentence Generation
          - Voice Synthesis
        outputs:
          - Natural Language Sentences
          - Voice Responses
          - Text Responses
        significance: >
          Combined traditional machine learning and modern LLM capabilities
          into a single multimodal workflow.

    leadership:
      role: Team Lead
      responsibilities:
        - Technical direction
        - Team coordination
        - Backend development
        - Frontend development
        - ML model development
        - System integration
      contributions:
        - Defined overall architecture
        - Coordinated work across team members
        - Built backend services
        - Built user interface
        - Integrated ML and AI components
        - Supported final demonstration
      outcome: >
        Successfully delivered a complete end-to-end accessibility solution
