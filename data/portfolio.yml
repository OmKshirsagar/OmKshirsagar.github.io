      - id: white-labeled-platform
        title: White-Labeled Platform (Reusable Deloitte Asset)
        status: in-progress                  # mid-migration from POC to generalized shell
        repo: SOP/ls-genai-realtime-contactcenter
        builds_on: [sop-fastapi-starter]     # outer shell uses Om's own Starter Kit foundation

        situation: >
          Following Exact RTVA's successful client delivery, leadership decided
          to generalize the architecture as a reusable Deloitte asset that
          could be re-skinned for future healthcare clients without rebuilding
          the entire stack.

        approach: >
          Outer FastAPI service uses Om's FastAPI Starter Kit as the
          foundation (architecture, MCP, observability inherited). Inner
          voiceAgentPOC/ module — originally the client's flagship product/the assistant-branded — is
          being progressively refactored into the generalized app/ shell
          with stubs to be filled. A todo.md tracks the multi-phase migration.

        tech_stack:
          runtime:
            python: ">=3.11 (inner POC: >=3.9)"
            fastapi: ">=0.115"
            data: [SQLAlchemy 2.0 async, asyncpg, Alembic]
            pydantic: v2
          ai_voice:
            - "openai[realtime] >=1.0.0"
            - "Model: gpt-4o-mini via Azure Voice Live API"
            - "azure-communication-callautomation >=1.2.0"
            - "azure-search-documents >=11.4.0 (semantic + vector)"
            - "Embedding: text-embedding-3-large"
            - "azure-eventgrid + azure-identity"
            - "websockets >=12.0"
          observability: [Prometheus, Grafana]
          deploy: [Docker, GitHub Actions → AWS ECR/ECS]    # note: runtime is Azure, CI is AWS

        interaction_model:
          # The HTML/AudioWorklet UI is for developer testing only.
          # Production users access the assistant via phone, not browser.
          dev_ui:
            type: HTML5 + Web Audio API worklet
            files: [static/index.html, static/audio-processor.js]
            purpose: developer testing only
          production_access:
            - Calling a 1-800 number routed via Azure Communication Services
            - Microsoft Teams call routing
          note: >
            No production browser UI. Customers / agents interact via voice
            phone calls. The Audio worklet UI exists purely so developers
            can iterate on the assistant locally without making real calls.

        key_components:
          acs_telephony: "voiceAgentPOC/app/handler/acs_event_handler.py"
          gpt_media_bridge: "voiceAgentPOC/app/handler/acs_media_handler.py (~950 LOC — session_config + function-call routing)"
          rag_search: "voiceAgentPOC/app/handler/azure_search_handler.py (knowledge index, text-embedding-3-large, semantic+vector schema)"
          hipaa_validation: "voiceAgentPOC/app/handler/acs_media_handler.py:577 hipaa_validation() — gates downstream tools via session_state.hipaa_validated"
          websocket_routes: "voiceAgentPOC/app/api/websockets.py + voice.py (/acs/ws, /web/ws, /api/v1/voice/webhook/incoming)"
          generalized_shell: "app/services/*.py (stubs being filled), app/api/websockets/, app/api/v1/voice/"

        agent_persona:
          name: Assistant
          # 9 search functions: search_product_info, search_test_instructions, ...

        white_label_progress:
          done:
            - Outer FastAPI shell scaffolded from FastAPI Starter Kit
            - Architecture documented for generalization
            - Migration plan in todo.md (Phase 1–N)
          in_progress:
            - "the client's flagship product branding still hardcoded: search index `product-knowledge-index`, function names search_product_info / search_test_instructions"
            - "System prompts mention the client's flagship product explicitly; agent persona the assistant hardcoded"
            - "app/services/*.py stubs await implementation logic from voiceAgentPOC/"
          done_when:
            - Client-name and product-name extracted to config
            - Knowledge index name parametrized
            - System prompts and function names abstracted
            - Tests cover generic shell

        outcome: >
          Reusable Deloitte asset (in progress) that lets future RTVA-style
          engagements skip large portions of the rebuild by inheriting the
          platform shell, observability, MCP-tool exposure, and standardized
          architecture from the FastAPI Starter Kit.

        career_significance: >
          Platform-thinking compounding: Om's own Starter Kit becomes the
          foundation for white-labeling his own client work.

        # NOTE on broader healthcare-voice-assistant claims:
        # The parent healthcare-voice-assistant project's `technologies` list claims React
        # frontend, Braze/SMS integration — these describe the ORIGINAL
        # Exact production system on Deloitte's internal GitLab, NOT
        # verifiable against this white-labeled SOP repo. The white-labeled
        # repo has plain HTML + AudioWorklet for the demo frontend and NO
        # Braze/SMS code. Either (a) Exact prod had different frontend/SMS,
        # (b) those features didn't carry into the white-label, or
        # (c) they live in sibling repos (ls-genai-agents, ls-genai-assets).
        # Pending user confirmation.

