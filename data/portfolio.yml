# 13. INTERVIEW STORIES  ·  STAR format, internal context only
# ---------------------------------------------------------------------
# Used by Claude to help with interview prep, resume tailoring,
# intro emails, etc. Marked public: false so the site builder skips.
# Consider moving to data/private.yml if you don't want these in public git.
interview_stories:

  - id: healthcare-voice-assistant-master-story
    title: Building a Real-Time Healthcare Voice Assistant
    project_ref: healthcare-voice-assistant
    public: false                        # interview prep, not for site

    why_powerful: >
      This single story demonstrates System Design + AI Engineering + RAG +
      Cloud + Deployments + Client Interaction + Ownership + Real-time
      Systems + Authentication + Rapid Learning + Business Impact. Most
      engineers need 4-5 separate stories to cover all of those.

    traits_demonstrated:
      - System Design
      - AI Engineering
      - RAG
      - Cloud
      - Deployments
      - Client Interaction
      - Ownership
      - Real-time Systems
      - Authentication
      - Rapid Learning
      - Business Impact

    # Ready-to-deliver answer for the "tell me about your biggest project" prompt
    sixty_second_version: >
      I was part of a lean team of three engineers building a real-time
      healthcare voice assistant for a US healthcare client. Users could
      call a phone number and interact with an AI agent powered by GPT
      Realtime. The system integrated Azure Communication Services,
      Azure AI Search, knowledge retrieval, authentication workflows,
      and backend systems to provide support around medications and
      order status. I owned major parts of the backend architecture and
      became the primary deployment owner, provisioning Azure resources,
      deploying environments, and supporting client demos. We successfully
      delivered the POC and later white-labeled the solution internally
      for demonstrations to other clients.

    # Question-framed variants — pick the right one per interview question.
    # Each `answer` is delivery-ready in 30–60 seconds spoken aloud.
    variants:

      - question_type: ownership
        prompt: Tell me about a time you took ownership.
        answer: >
          During the US healthcare diagnostics provider Voice Assistant project, deployment
          ownership became a challenge. We were a lean team with senior
          engineers focused primarily on development, but someone needed to
          provision Azure resources, configure GPT deployments, set up Azure
          Communication Services, deploy environments, and troubleshoot
          infrastructure issues. I stepped into that gap and became the
          deployment owner for the project. This allowed us to deliver
          working environments for client demonstrations and reduced
          dependency on external support teams.

      - question_type: architecture
        prompt: Tell me about a system you designed.
        answer: >
          We built a real-time voice assistant where users called a support
          number and interacted directly with an AI agent. The architecture
          involved Azure Communication Services for telephony, GPT Realtime
          for conversation handling, Azure AI Search for retrieval, FastAPI
          services for orchestration, and integrations into client systems
          for authentication and order lookup. The challenge was maintaining
          conversational responsiveness while still grounding responses in
          enterprise knowledge sources.

      - question_type: ai
        prompt: Tell me about an AI solution you've built.
        answer: >
          We developed a healthcare support assistant capable of answering
          medication-related questions, authenticating users, retrieving
          order information, and supporting customer service workflows.
          The solution combined GPT Realtime with retrieval-based
          architectures and enterprise integrations. Unlike traditional
          chatbots, the interaction was entirely voice-based and designed
          to feel conversational in real time.

      - question_type: leadership
        prompt: Tell me about leadership without authority.
        answer: >
          Although I wasn't the project lead, I took ownership of
          deployment, infrastructure setup, and several backend
          integrations. I proactively solved issues around provisioning,
          environment management, and deployment pipelines, enabling the
          team to focus on delivery and helping ensure successful client
          demonstrations.

      - question_type: learning
        prompt: Tell me about something you learned quickly.
        answer: >
          The project required working with Azure Communication Services,
          GPT Realtime, and Azure deployment patterns that I had not used
          extensively before. I rapidly learned the services, understood
          their limitations, built integrations, and became the primary
          deployment resource for the project within a relatively short
          time.


