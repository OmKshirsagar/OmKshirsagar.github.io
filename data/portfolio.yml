    ownership: lead
    featured: true                         # ★ featured on home page
    order: 2                               # display order: 2 of 3

    repo: Deloitte-Default/fastapi-starterkit   # internal GitHub
    catalog_owner: user:om.kshirsagar           # per Backstage catalog-info.yaml

    project_type:
      - Engineering Foundation
      - Developer Platform
      - Internal Framework

    background: >
      Across Deloitte projects, new FastAPI applications were typically
      created by copying starter code from previous projects. These starter
      kits varied greatly in quality, were often outdated, lacked testing
      support, and resulted in inconsistent architecture across teams.

    problems_identified:
      - No standardized project structure
      - Repeated boilerplate across projects
      - Missing testing frameworks
      - Inconsistent coding standards
      - Weak abstraction layers
      - Duplicate implementation effort
      - Difficult onboarding for new developers

    vision: >
      Create a production-ready FastAPI foundation that teams could use to
      rapidly start projects while maintaining engineering standards and
      consistency.

    solution: >
      Designed and implemented a reusable FastAPI starter framework
      containing standardized architecture, reusable abstractions, testing
      infrastructure, deployment readiness, and development best practices.

    tech_stack:
      runtime:
        python: ">=3.12"
        fastapi: ">=0.118 (with [standard])"
      data:
        sqlalchemy: "2.0 async"
        drivers: [asyncpg, psycopg2-binary]
        migrations: Alembic 1.14
      auth:
        - PyJWT[crypto]                   # replaces python-jose
        - bcrypt
      logging:
        - structlog ">=24.4"             # JSON in prod, pretty in dev
      mcp:
        - "mcp >=1.27"
        - "fastmcp >=3.3"                # ← integrated; mounted at /mcp
      observability:
        - prometheus-client
        - prometheus-fastapi-instrumentator
      tooling:
        package_manager: UV
        lint_format: Ruff (replaces black + bandit)
        type_check: mypy strict + pyrefly
        testing: pytest 8 + pytest-asyncio + pytest-cov
        hooks: pre-commit + Commitizen (Conventional Commits)
      containers: [Docker, Podman compose]
      docs: [mkdocs, Backstage TechDocs catalog-info.yaml]

    architecture:
      key_components:
        - Standardized Project Structure
        - Environment Configuration Framework
        - API Layer Abstractions
        - Service Layer Pattern
        - Repository Pattern
        - Database Abstractions
        - Error Handling Framework
        - Logging Framework
        - Testing Infrastructure
        - Dependency Injection Patterns

      # Concrete file paths inside the repo for each pattern
      pattern_references:
        project_layout: "app/{api,config,core,crud,db,models,schemas} + migration/ + tests/{unit,integration}"
        repository_pattern: "app/crud/base.py — generic CRUDBase[ModelType, CreateSchemaType, UpdateSchemaType, ResponseSchemaType] with safe_commit async transaction context manager"
        service_layer: "app/api/v1/users/controller.py (separated from routes.py)"
        api_versioning: "app/api/v1/ with sub-routers (auth/routes.py, users/routes.py)"
        dependency_injection: "app/api/dependencies/deps.py"
        middleware: "app/api/middleware/{logging.py, request_id.py} (correlation IDs)"
        error_handling: "app/core/exceptions.py + exception_handlers.py + enums.py ErrorCode"
        response_standardization: "app/core/base_response.py + schemas/{base,pagination,filters}.py"
        logging: "app/core/logging.py (structlog, DEV_MODE-controlled formatting)"
        security: "app/core/security.py (JWT, API key, password hashing)"
        env_config: "app/config/config.py (pydantic_settings BaseSettings + .env.dev)"
        mcp_integration: "app/core/mcp/{server,client,auth,tokens,tools}.py — mounted via combined lifespan in app/main.py"
        observability: "app/core/enhanced_metrics.py + Prometheus instrumentator wired in main.py"

    engineering_standards:
      included:
        - Pytest Configuration (asyncio auto-mode)
        - "Test coverage gate: --cov-fail-under=100"     # ← 100% required
        - Pytest markers (unit/integration/api/db/slow/security)
        - "Ruff: E,W,F,I,C,B,UP,S,SIM,RET,ARG,ERA,PT,RUF,ASYNC rule sets"
        - "mypy strict + Pydantic/SQLAlchemy plugins + pyrefly"
        - Pre-commit + Commitizen (Conventional Commits, commit-msg hook)
        - "Scripts: scripts/{format.sh, lint.sh, prestart.sh}"
        - Docs templates (mkdocs + Backstage TechDocs)

    documentation:
      docs_hub: "docs/starterkit-docs/index.md"
      sections:
        - "CORE_FRAMEWORK/API_CONSTRUCTION/{exception-framework, responses, logging-framework}.md"
        - "CORE_FRAMEWORK/DATA_PERSISTENCE/{database, schemas, alembic-migrations}.md"
        - "CORE_FRAMEWORK/FEATURES/{user-management, security, fastmcp-auth}.md"
        - "CORE_FRAMEWORK/INTEGRATIONS/{mcp-setup, mcp-toolbox, observability-setup}.md"
        - "TESTING/{testing-guide, testing-implementation}.md"
      deployment_guide: docs/deployment.md

    technical_decisions:
      - title: Standardized Architecture
        reason: >
          Ensure consistency across projects and reduce onboarding effort.
      - title: Reusable Base Components
        reason: >
          Reduce duplicate implementation effort across teams.
      - title: Testing-First Foundation
        reason: >
          Improve long-term maintainability and quality.

    my_contributions:
      - Identified organizational engineering gap
      - Designed framework architecture
      - Built reusable abstractions
      - Implemented testing support
      - Created developer documentation
      - Supported adoption across projects

    technologies:
      backend: [Python, FastAPI]
      testing: [Pytest]
      databases: [PostgreSQL]

    adoption:
      known_projects_minimum: 12
      summary: >
        The framework became a commonly used starting point for FastAPI-based
        projects and significantly reduced setup effort for new initiatives.

    outcomes:
      engineering:
        - Faster project onboarding
        - Consistent architecture
        - Reduced technical debt
        - Improved developer productivity
      organizational:
        - Reuse across multiple teams
        - Improved engineering standards
        - Reduced duplicated effort

    recognition:
      contributed_to_award: Outstanding Award (March 2025)

    career_significance: >
      Demonstrated platform thinking and engineering leadership. Rather than
      solving a project-specific problem, it improved the development
      experience and quality standards for future projects across multiple
      teams.

    skills_demonstrated:
      - Software Architecture
      - Platform Engineering
      - Technical Leadership
      - Developer Experience
      - Backend Engineering
      - Engineering Standards

    summary: |
      Production-ready FastAPI starter framework — standardized structure,
      reusable abstractions, testing infrastructure, and engineering
      standards. Adopted by 12+ projects, reducing setup time and enforcing
      consistent architecture across Deloitte FastAPI services.

